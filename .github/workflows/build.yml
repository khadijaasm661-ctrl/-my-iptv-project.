name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          java-package: jdk

      - name: Generate Wrapper and Build
        run: |
          # توليد نسخة متوافقة من gradlew
          gradle wrapper
          chmod +x gradlew
          # بناء التطبيق
          ./gradlew :app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My-IPTV-App
          path: "app/build/outputs/apk/debug/*.apk"
