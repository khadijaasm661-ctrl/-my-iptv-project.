name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        run: |
          # تثبيت نظام بناء Gradle
          sudo apt-get update
          sudo apt-get install -y gradle
          # توليد ملف المساعدة gradlew إذا كان مفقوداً
          gradle wrapper
          chmod +x gradlew

      - name: Build APK
        # بناء التطبيق داخل مجلد app تحديداً
        run: ./gradlew :app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My-IPTV-App
          path: "app/build/outputs/apk/debug/*.apk"
